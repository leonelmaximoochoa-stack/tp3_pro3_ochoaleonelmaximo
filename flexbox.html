<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 1 - Flexbox</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flexbox.css">
</head>
<body>
  <header class="header">
    <h1>Ejercicio 1: Flexbox</h1>
    <nav class="nav-back">
      <a href="index.html">← Volver al inicio</a>
    </nav>
  </header>

  <main class="container flexbox-page">
    <section class="flexbox-intro">
      <h2>Tecnologías web</h2>
      <p>Tarjetas organizadas con Flexbox. Usá los botones para ordenar, filtrar o resaltar.</p>
    </section>

    <div class="flexbox-controls">
      <button type="button" id="btn-ordenar" class="btn-control">Ordenar A → Z</button>
      <button type="button" id="btn-filtrar" class="btn-control">Solo destacados</button>
      <button type="button" id="btn-resaltar" class="btn-control">Resaltar Frontend</button>
    </div>

    <div id="cards-container" class="cards-container">
      <!-- Las tarjetas se generan desde js/flexbox.js -->
    </div>
  </main>

  <footer class="footer">
    <p>TP3 - Programación 3</p>
  </footer>

  <script src="js/flexbox.js"></script>
</body>
</html>
