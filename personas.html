<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 2 - Personas</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/personas.css">
</head>
<body>
  <header class="header">
    <h1>Ejercicio 2: Formulario de Personas</h1>
    <nav class="nav-back">
      <a href="index.html">← Volver al inicio</a>
    </nav>
  </header>

  <main class="container personas-page">
    <section class="personas-intro">
      <h2>Cargar persona</h2>
      <p>Completá el formulario para agregar una persona a la tabla.</p>
    </section>

    <form id="form-persona" class="form-persona" novalidate>
      <div class="form-grupo">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan">
      </div>

      <div class="form-grupo">
        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" required placeholder="Ej: Pérez">
      </div>

      <div class="form-grupo">
        <label for="edad">Edad</label>
        <input type="number" id="edad" name="edad" required min="1" max="120" placeholder="Ej: 25">
      </div>

      <div class="form-grupo">
        <label for="altura">Altura (cm)</label>
        <input type="number" id="altura" name="altura" required min="50" max="250" step="0.1" placeholder="Ej: 175">
      </div>

      <div class="form-grupo">
        <label for="peso">Peso (kg)</label>
        <input type="number" id="peso" name="peso" required min="20" max="300" step="0.1" placeholder="Ej: 70">
      </div>

      <button type="submit" class="btn-agregar">Agregar persona</button>
    </form>

    <p id="mensaje-error" class="mensaje-error" aria-live="polite"></p>

    <section class="tabla-seccion">
      <h2>Lista de personas</h2>
      <div class="tabla-contenedor">
        <table id="tabla-personas" class="tabla-personas">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Edad</th>
              <th>Altura (cm)</th>
              <th>Peso (kg)</th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            <!-- Filas generadas dinámicamente con JavaScript -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>TP3 - Programación 3</p>
  </footer>
</body>
</html>
